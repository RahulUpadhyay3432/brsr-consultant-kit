# Refreshes the Saaksh Brief news feed every 20 minutes. Vercel Hobby crons run only
# once a day, so this GitHub Action drives freshness by hitting the same secured
# endpoint. (Scheduled runs are best-effort on GitHub's side, so effective freshness
# is ~20-35 min.) Secrets required (already set): APP_URL, CRON_SECRET.
name: Refresh Saaksh Brief

on:
  schedule:
    - cron: "*/20 * * * *" # every 20 min (UTC) — freshest practical without paid crons
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger news ingestion
        run: |
          if [ -z "${{ secrets.APP_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "APP_URL / CRON_SECRET not set; skipping."
            exit 0
          fi
          curl -fsS -X GET "${{ secrets.APP_URL }}/api/cron/news" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120 | head -c 500
