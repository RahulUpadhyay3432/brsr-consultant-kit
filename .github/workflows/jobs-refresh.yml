# Free jobs scraper — runs a real headless Chromium on GitHub's CI runner (no paid
# scraping API), extracts + link-verifies ESG roles, and upserts them into Supabase
# `brsr_jobs`. Served on the board via /api/jobs on top of the curated jobs.json.
#
# To enable, add these repo secrets (Settings -> Secrets and variables -> Actions):
#   NEXT_PUBLIC_SUPABASE_URL      your Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY     the service_role key (server-side only)
#   GROQ_API_KEY                  (+ optional GROQ_API_KEY_2..6 to spread free limits)
# It also no-ops safely if the secrets or the brsr_jobs table are absent.
name: Refresh ESG jobs board

on:
  schedule:
    - cron: "0 3,15 * * *" # twice daily (UTC)
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Scrape + store jobs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          GROQ_API_KEY_6: ${{ secrets.GROQ_API_KEY_6 }}
        run: node scripts/scrape-jobs.mjs
