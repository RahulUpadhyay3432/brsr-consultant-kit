<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Saaksh community icon: the "Ledger S" brand mark (see src/app/icon.svg),
       full-bleed navy so a WhatsApp circle crop shows a clean navy disc with the
       mark centered inside the circle-safe area. No text (illegible at icon size). -->
  <rect width="1024" height="1024" fill="#0F1E33"/>
  <g transform="translate(-15,16) scale(15.5)">
    <rect x="14" y="11" width="36" height="7" rx="3.5" fill="#FBFCFE"/>
    <rect x="20" y="28.5" width="30" height="7" rx="3.5" fill="#FBFCFE"/>
    <rect x="14" y="46" width="30" height="7" rx="3.5" fill="#FBFCFE"/>
    <rect x="47" y="46" width="7" height="7" rx="3.5" fill="#1E9DF2"/>
  </g>
</svg>
